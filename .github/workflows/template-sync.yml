name: Update Specific Changes from Template

on:
  schedule:
    - cron: '0 0 * * 0' # Runs weekly at midnight on Sunday
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-template-feature:
    name: Sync Specific Updates from Template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Website Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Template Repository as Remote
        run: |
          git remote add template https://github.com/louisescher/spectre.git
          git fetch template master

      - name: Identify New Changes
        id: check_updates
        run: |
          echo "Available commits from template:"
          git log HEAD..template/main --oneline
          echo "commit_list=$(git log HEAD..template/main --pretty=format:'%H' | tr '\n' ' ')" >> $GITHUB_ENV

      - name: Cherry-Pick New Changes
        if: ${{ env.commit_list != '' }}
        run: |
          git checkout -b cherry-pick-template-$(date +%Y-%m-%d)
          for commit in ${{ env.commit_list }}; do
            echo "Cherry-picking $commit"
            git cherry-pick --no-commit $commit || (echo "::error::Conflict detected while cherry-picking $commit" && exit 1)
          done

      - name: Install Dependencies and Build Site
        run: |
          npm install
          npm run build

      - name: Commit and Push Changes
        run: |
          git commit -m "Cherry-picked updates from louisescher/spectre on $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push origin cherry-pick-template-$(date +%Y-%m-%d)

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Cherry-Pick Updates from Template Repository"
          body: |
            Automated cherry-pick updates from the [louisescher/spectre](https://github.com/louisescher/spectre) template repository.
            Please review and test before merging.
          branch: cherry-pick-template-$(date +%Y-%m-%d)
          delete-branch: true
