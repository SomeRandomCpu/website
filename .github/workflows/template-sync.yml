name: Update from Template Repository

on:
  schedule:
    - cron: '0 0 * * 0' # Runs weekly at midnight on Sunday
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Needed for pushing updates to the repo
  pull-requests: write # Needed for opening pull requests

jobs:
  update-template:
    name: Sync Template Updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Website Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for accurate merging

      - name: Set Up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Template Repository as Remote
        run: |
          git remote add template https://github.com/louisescher/spectre.git
          git fetch template main

      - name: Create Update Branch
        run: |
          git checkout -b update-from-template-$(date +%Y-%m-%d)

      - name: Merge Template Changes
        id: merge
        run: |
          git merge --no-commit --no-ff template/main || echo "Merge conflicts detected" > conflicts.txt

      - name: Handle Merge Conflicts
        if: ${{ failure() }}
        run: |
          echo "::error::Merge conflicts detected. Please resolve manually."
          exit 1

      - name: Install Dependencies and Check Build
        run: |
          npm install
          npm run build

      - name: Commit and Push Changes
        run: |
          git commit -m "Merge updates from louisescher/spectre template on $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push origin update-from-template-$(date +%Y-%m-%d)

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Update from Template Repository"
          body: |
            Automated update from the [louisescher/spectre](https://github.com/louisescher/spectre) template repository.
            Please review and test before merging.
          branch: update-from-template-$(date +%Y-%m-%d)
          delete-branch: true
