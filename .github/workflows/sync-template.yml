name: Sync with Template

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Add Template Repo
        run: |
          git remote add template https://github.com/louisescher/spectre.git || true
          git fetch template

      - name: Merge Changes from Template
        run: |
          git checkout main
          git merge template/main --allow-unrelated-histories -m "Merge updates from template"

      - name: Push Changes to Your Repo
        run: |
          git push origin main
